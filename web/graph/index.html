<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>cortex graph</title>
		<link rel="stylesheet" href="overlay.css" />
	</head>
	<body>
		<div id="prompt">$ cortex graph<span id="cursor">&#9611;</span></div>
		<div id="breadcrumb"></div>
		<div id="controls">
			<select id="mode">
				<option value="code">code</option>
				<option value="memory">memory</option>
			</select>
			<select id="project" title="project scope">
				<option value="all">all projects</option>
			</select>
			<select id="searchmode" title="code search mode">
				<option value="find">find</option>
				<option value="suggest">suggest_files</option>
			</select>
			<input id="search" placeholder="…" />
			<label id="fnsToggle" title="show function nodes" hidden>
				<input type="checkbox" id="fns" /> functions
				<span id="fnsCount"></span>
			</label>
		</div>
		<div id="legend"></div>
		<div id="hint"></div>
		<div id="panel" hidden></div>
		<div id="card" hidden></div>
		<div id="graph"></div>
		<div id="scanlines"></div>
		<script>
			(function () {
				function box() {
					var el = document.getElementById("err");
					if (!el) {
						el = document.createElement("div");
						el.id = "err";
						el.style.cssText =
							"position:fixed;bottom:0;left:0;right:0;z-index:99;background:#300;color:#f88;font:12px ui-monospace,monospace;padding:8px;white-space:pre-wrap;max-height:45vh;overflow:auto";
						document.body.appendChild(el);
					}
					return el;
				}
				window.addEventListener("error", function (e) {
					box().textContent +=
						(e.message || e.error || e) +
						"\n" +
						((e.error && e.error.stack) || "") +
						"\n";
				});
				window.addEventListener("unhandledrejection", function (e) {
					box().textContent +=
						"promise: " + ((e.reason && e.reason.stack) || e.reason) + "\n";
				});
			})();
		</script>
		<script type="module" src="app3d.js"></script>
	</body>
</html>
